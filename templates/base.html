<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Filament Tracker</title>
  <link rel="icon" href="/static/main-icon.png?v={{ asset_v }}">
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="/static/app.js?v={{ asset_v }}" defer></script>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_v }}">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand-group">
        <a href="/" class="brand">
          <img src="/static/main-icon.png?v={{ asset_v }}" alt="" class="brand-mark">
          <span class="brand-name">Filament Tracker</span>
        </a>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
          <span class="theme-toggle-label">Theme</span>
          <span class="theme-toggle-icon">&#9728;&#65039;</span>
        </button>
      </div>
      <nav class="tabs">
        <a href="/spools" class="{% if active_nav == "spools" %}active{% endif %}">Spools</a>
        <a href="/spools/new" class="{% if active_nav == "spool-new" %}active{% endif %}">Add Spool</a>
        <a href="/brands" class="{% if active_nav == "brands" %}active{% endif %}">Brands</a>
        <a href="/materials" class="{% if active_nav == "materials" %}active{% endif %}">Materials</a>
        <a href="/colours" class="{% if active_nav == "colours" %}active{% endif %}">Colours</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <div id="lightbox" class="lightbox" hidden>
    <button type="button" class="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="">
  </div>
</body>
</html>
